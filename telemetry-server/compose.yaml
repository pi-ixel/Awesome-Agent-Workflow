services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: aaw_telemetry
      MYSQL_USER: aaw
      MYSQL_PASSWORD: aaw
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
