# ═══════════════════════════════════════════════════════════
#  portal 前端部署 · Nginx 配置（同源反向代理方案）
#
#  部署时只需改下面 server 块里的 3 处（都用 ← TODO 标注）：
#    1. listen        —— 对外的 IP 和端口
#    2. root          —— 前端文件所在目录
#    3. proxy_pass    —— 后端服务的地址和端口（后端启动后填）
#
#  改完执行： nginx -t   （检查语法）
#            nginx -s reload  （或首次启动 start nginx）
#
#  浏览器访问： http://<listen 的 IP>:<端口>/bright.html
# ═══════════════════════════════════════════════════════════

server {
    # ① 对外监听的 IP 和端口 ← TODO
    #    仅本机访问用 127.0.0.1；本服务器所有网卡用 0.0.0.0；
    #    指定网卡就写具体 IP，例如 192.168.1.100:8080
    listen       0.0.0.0:8080;
    server_name  _;

    # ② 前端文件目录 ← TODO（Nginx 用正斜杠，Windows 路径也写 / ）
    root   D:/program/portal;
    index  bright.html;

    # 默认首页重定向到 bright.html（可选，方便直接访问根路径）
    location = / {
        return 302 /bright.html;
    }

    # 静态资源：找不到文件回落到 bright.html（单页直连各文件都走这里）
    location / {
        try_files $uri $uri/ =404;
    }

    # ③ 后端接口反向代理 ← TODO
    #    把 /api/v1/ 开头的请求转发给后端服务。
    #    后端启动后，把 http://127.0.0.1:9000 换成实际地址:端口。
    #    若后端和本机不同机，写后端机器的 IP:端口即可。
    location /api/v1/ {
        proxy_pass         http://127.0.0.1:9000;   # 末尾不要加 /
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 后端响应慢时可放宽超时（要和 config.js 的 timeout 协调，当前 15s）
        proxy_connect_timeout 15s;
        proxy_read_timeout    30s;
    }

    # 静态资源缓存（HTML 不缓存，保证 config.js 改动即时生效）
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }
}
