version: 2

entrypoints:
  sr:
    start: sr-init
    vars: [SR]
  ar:
    start: ar-init
    vars: [SR, AR, 描述]

edges:
  sr-init:
    kind: direct
    to: sr-design

  sr-design:
    kind: direct
    to: ar-split

  ar-init:
    kind: direct
    to: ar-clarify

  ar-split:
    kind: choice
    choices:
      - when: data.ars
        to: ar-clarify
        foreach: data.ars
        vars:
          AR: "{item.id}"
          描述: "{item.title}"
      - when: data.mode == 'no_split'
        to: module-boundary-design
        vars:
          AR: "ALL"
          描述: "SR整体"
    data_schema:
      description: "询问用户是否拆分 AR，两种方式二选一"
      fields:
        ars:
          description: "拆分 AR 时使用。id 是稳定目录标识，title 是可读标题。"
          example: [{id: AR-001, title: 用户管理}]
        mode:
          description: "不拆分时使用，固定填 no_split。"
          example: no_split

  ar-clarify:
    kind: direct
    to: module-boundary-design

  module-boundary-design:
    kind: direct
    to: module-detail-design-split

  module-detail-design-split:
    kind: foreach
    to: module-asis-analysis
    foreach: data.module_groups
    vars:
      模块组名: "模块{item.name}"
      需求短名: "{item.requirement}"
    data_schema:
      description: "根据 boundary-design 分析结果，将受影响模块划分为若干组"
      fields:
        module_groups:
          description: "模块分组列表。每组 2-4 个模块，一起做详细设计。"
          example:
            - name: "A,B"
              modules: ["模块A", "模块B"]
              requirement: "用户管理"

  module-asis-analysis:
    kind: direct
    to: module-tobe-design

  module-tobe-design:
    kind: direct
    to: module-test-design

  module-test-design:
    kind: direct
    to: module-design-gate

  module-design-gate:
    kind: choice
    choices:
      - when: data.gate_result == 'pass'
        to: task-split
    reject:
      - when: data.gate_result == 'fail'
        message: "门禁不通过，不能进入 task-split；请根据门禁结果原地修正 ASIS/TOBE/测试设计后重新执行 gate。只有用户明确要求重走上游节点，或已生成需要废弃的下游 step 时，才执行 rollback。"
      - when: data.gate_result == 'blocked'
        message: "门禁阻塞，不能进入 task-split；请补齐门禁结果中列出的必要输入后重新执行 gate。不要自动 rollback。"
    data_schema:
      description: "提交模块设计门禁结论；只有 gate_result=pass 会推进到 task-split。"
      fields:
        gate_result:
          description: "门禁结论。通过填 pass；不通过填 fail；阻塞填 blocked。"
          example: pass
        recommendation:
          description: "门禁建议，例如 可进入 AICoding / 回 TOBE 补设计后重试 / 阻塞，缺少必要输入。"
          example: "可进入 AICoding"
        report:
          description: "门禁结果摘要或门禁结果文件路径。"
          example: ".sdd/SR-001/AR-001/AR-001-用户管理-模块A模块设计门禁结果.md"

  task-split:
    kind: foreach
    to: task-dev
    foreach: data.tasks
    item_validation:
      reject_pattern: "^T\\d+-"
      message: "tasks 列表项不要包含 T1-/T2- 前缀，只填写任务标题。"
    vars:
      序号: "{index}"
      任务标题: "{item}"
    data_schema:
      description: "从 task-split 生成的 tasks 目录中提取任务列表"
      fields:
        tasks:
          description: "任务标题列表，每个任务对应一个独立开发单元；不要包含 T1-/T2- 前缀或 .md 后缀。"
          example: ["用户CRUD", "权限校验"]

  task-dev:
    kind: terminal
