name: module-detail-design-split
execution: prompt
prompt:
  steps:
    - read: "读取 module-boundary-design.md，识别受影响模块、耦合关系和交互关系。"
    - propose: "建议模块分组方案；每组建议 2-4 个模块。"
    - confirm: "向用户展示分组建议并确认。"
    - data: "确认后构造 module_groups 数组，每项包含 name、modules、requirement。"
input:
  - path: ".sdd/{SR}/{AR}/module-boundary-design.md"
    required: true
output: []
data_prompt:
  description: "收集模块分组列表；若用户选择不拆分，将所有模块放入一个 group。"
