name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Test, package and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            telemetry-server/pyproject.toml

      - name: Validate tag and release source
        id: release
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '\r\n' < skills/aaw-workflow/scripts/cli/VERSION)"
          if [[ ! "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Invalid VERSION: $version" >&2
            exit 1
          fi
          if [[ "$GITHUB_REF_NAME" != "v$version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match VERSION $version" >&2
            exit 1
          fi
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          test -f "docs/releases/$version.md"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip uv
          python -m pip install -e "./telemetry-server[test]"

      - name: Test Skill release and updater
        working-directory: test/aaw_workflow
        run: >-
          uv run python -m unittest
          test_release_package
          test_cli_version
          test_cli_update
          test_cli_auto_update

      - name: Test telemetry server
        working-directory: telemetry-server
        run: |
          python -m ruff check .
          python -m pytest

      - name: Validate Portal static resources
        shell: bash
        run: |
          set -euo pipefail
          portal="telemetry-front/portal"
          grep -Eq 'apiBase:[[:space:]]*"/api/v1"' "$portal/config.js"
          grep -Eq 'useMock:[[:space:]]*false' "$portal/config.js"
          test -s "$portal/bright.html"
          test -s "$portal/bright.css"
          test -s "$portal/bright.js"
          test -s "$portal/vendor/echarts.min.js"

      - name: Build release artifacts
        run: python scripts/make_release.py

      - name: Verify artifact checksums
        working-directory: dist
        run: sha256sum --check SHA256SUMS

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 && {
            echo "Release $GITHUB_REF_NAME already exists" >&2
            exit 1
          }
          gh release create "$GITHUB_REF_NAME" \
            "dist/aaw-skills-$VERSION.zip" \
            "dist/aaw-telemetry-server-$VERSION.tar.gz" \
            "dist/aaw-telemetry-portal-$VERSION.tar.gz" \
            "dist/release-metadata.json" \
            "dist/SHA256SUMS" \
            --verify-tag \
            --title "AAW $VERSION" \
            --notes-file "docs/releases/$VERSION.md"
